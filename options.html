<!DOCTYPE html>
<html>
<head>
  <title>Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 24px;
      width: 380px;
      min-height: 300px;
      background: #f9fafb;
      color: #1a1a1a;
    }
    .container { display: flex; flex-direction: column; gap: 16px; }
    h2 {
      font-size: 18px;
      color: #0a66c2;
      border-bottom: 2px solid #0a66c2;
      padding-bottom: 8px;
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    label {
      font-weight: 600;
      font-size: 13px;
      color: #333;
    }
    input[type="password"], select {
      padding: 10px 12px;
      font-size: 14px;
      width: 100%;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      background: #fff;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus, select:focus {
      outline: none;
      border-color: #0a66c2;
      box-shadow: 0 0 0 2px rgba(10, 102, 194, 0.15);
    }
    .hint {
      font-size: 11px;
      color: #666;
      line-height: 1.4;
    }
    .hint a { color: #0a66c2; }
    button {
      padding: 10px;
      background: linear-gradient(135deg, #0a66c2, #0073b1);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
    }
    button:hover {
      background: linear-gradient(135deg, #004182, #005a8c);
      transform: translateY(-1px);
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    #status {
      color: #16a34a;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      display: none;
      padding: 8px;
      background: #f0fdf4;
      border-radius: 6px;
      border: 1px solid #bbf7d0;
    }
    .btn-row { display: flex; gap: 8px; }
    .btn-row button { flex: 1; }
    #testBtn {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
    }
    #testBtn:hover {
      background: linear-gradient(135deg, #4338ca, #3730a3);
    }
    #testResult {
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      display: none;
      padding: 8px;
      border-radius: 6px;
      line-height: 1.4;
      word-break: break-word;
    }
    #testResult.success {
      color: #16a34a;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
    }
    #testResult.error {
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fecaca;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Settings</h2>

    <div class="field">
      <label for="geminiApiKey">Google Gemini API Key</label>
      <input type="password" id="geminiApiKey" placeholder="Paste your Gemini API key here">
      <p class="hint">Get your key from <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a></p>
    </div>

    <div class="field">
      <label for="modelSelect">AI Model</label>
      <select id="modelSelect">
        <option value="gemini-2.5-flash-lite" selected>Gemini 2.5 Flash Lite (Recommended — Free-friendly)</option>
        <option value="gemini-2.0-flash">Gemini 2.0 Flash (Fast)</option>
        <option value="gemini-2.5-flash-preview-04-17">Gemini 2.5 Flash Preview</option>
        <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
        <option value="gemini-1.5-flash-8b">Gemini 1.5 Flash 8B (Lightweight)</option>
        <option value="gemini-1.5-pro">Gemini 1.5 Pro (Best quality)</option>
        <option value="gemini-2.5-pro-preview-03-25">Gemini 2.5 Pro Preview (Highest quality)</option>
      </select>
      <p class="hint">Lite/Flash models are faster and use less quota. Pro models provide better quality.</p>
    </div>

    <div class="btn-row">
      <button id="saveBtn">Save</button>
      <button id="testBtn">Test Connection</button>
    </div>
    <div id="status">Settings saved successfully!</div>
    <div id="testResult"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
